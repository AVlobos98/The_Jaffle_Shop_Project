version: 2

models:
  - name: stg_jaffle_shop__orders
    description: "One row per order. Contains all order details including customer and store information."
    columns:
      - name: order_id
        description: "Unique identifier for each order."
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null

  - name: stg_jaffle_shop__customers
    description: "One row per customer."
    columns:
      - name: customer_id
        description: "Unique identifier for each customer."
        tests:
          - unique
          - not_null

  - name: stg_jaffle_shop__stores
    description: "One row per store."
    columns:
      - name: store_id
        description: "Unique identifier for each store."
        tests:
          - unique
          - not_null