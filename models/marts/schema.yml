version: 2

models:
  - name: fct_orders
    description: "One row per order that contains customer, store, and other attributions"
    columns:
      - name: order_id
        description: "Unique identifier for each order."
        tests:
          - unique
          - not_null
      - name: customer_id
        description: "Foreign key to dim_customers."
        tests:
          - not_null
      - name: store_id
        description: "Foreign key to the store where the order was placed."
        tests:
          - not_null

  - name: dim_customers
    description: "One row per customer, with their lifetime stats"
    columns:
      - name: customer_id
        description: "Unique identifier for each customer."
        tests:
          - unique
          - not_null

  - name: mart_store_metrics
    description: "One row per store per month containing aggregated order and revenue metrics."
    columns:
      - name: store_id
        tests:
          - not_null

  - name: mart_customer_monthly
    description: "Customer ID broken out by monthly stats"
    columns:
      - name: customer_id
        tests:
          - not_null